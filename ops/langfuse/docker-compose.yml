# Self-hosted Langfuse stack for VeriClaim LLMOps.
#
# Usage:
#   1. Copy .env.example to .env and fill in secrets.
#   2. docker compose up -d
#   3. Visit http://localhost:3000 and create a project.
#   4. Copy the public/secret keys into the top-level .env under
#      LANGFUSE_PUBLIC_KEY / LANGFUSE_SECRET_KEY / LANGFUSE_HOST.
#
# Langfuse v2 requires Postgres (clickhouse optional for analytics).
# This compose file keeps it minimal: Postgres + Langfuse web.

version: "3.9"

services:
  langfuse-db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: langfuse
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-langfuse_dev_password}
      POSTGRES_DB: langfuse
    volumes:
      - langfuse_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U langfuse"]
      interval: 10s
      timeout: 5s
      retries: 5

  langfuse:
    image: langfuse/langfuse:2
    restart: unless-stopped
    depends_on:
      langfuse-db:
        condition: service_healthy
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://langfuse:${POSTGRES_PASSWORD:-langfuse_dev_password}@langfuse-db:5432/langfuse
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-vericlaim_dev_nextauth_secret_change_me}
      SALT: ${LANGFUSE_SALT:-vericlaim_dev_salt_change_me}
      # Disable telemetry for local dev
      TELEMETRY_ENABLED: "false"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/public/health | grep -q ok"]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 30s

volumes:
  langfuse_db_data:
