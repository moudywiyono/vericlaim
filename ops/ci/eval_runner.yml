name: Eval CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  component-evals:
    name: Component Evals
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run component suites
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          VERICLAIM_DEFAULT_MODEL: claude-haiku-4-5-20251001
          # Gold set gate deliberately NOT set — component evals use synthetic data only
        run: |
          python -m pytest evals/ -v \
            --tb=short \
            -k "not e2e and not adversarial" \
            --junitxml=eval-results/component.xml

      - name: Post eval delta comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            // TODO: parse eval-results/component.xml and post metric delta vs main
            // placeholder until SuiteResult.delta() is implemented
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '## Eval Results\n\nComponent eval run complete. Delta reporting pending SuiteResult implementation.'
            });

      - name: Upload eval artifacts
        uses: actions/upload-artifact@v4
        with:
          name: eval-results-${{ github.sha }}
          path: eval-results/
          retention-days: 90
